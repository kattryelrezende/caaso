<!-- admin-login.html - Login para o painel administrativo -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Admin | CAASO</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/icon-caaso.ico">
</head>
<body>
    <section class="page-section" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="card-street" style="max-width: 400px; width: 100%;">
            <div class="header-street mb-4" style="display: block; text-align: center;">
                <h2>ACESSO ADMIN</h2>
            </div>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-user">Usuário (NUSP)</label>
                    <input type="text" id="admin-user" required placeholder="Seu NUSP">
                </div>
                <div class="form-group">
                    <label for="admin-pass">Senha</label>
                    <input type="password" id="admin-pass" required placeholder="••••••">
                </div>
                <button type="submit" class="btn-primary w-100">ENTRAR</button>
                <p id="login-error" style="color: var(--caaso-red); margin-top: 1rem; text-align: center; display: none;">Credenciais inválidas ou usuário não é admin.</p>
            </form>
        </div>
    </section>

    <script type="module">
        import { auth } from './js/services/api.js';

        const form = document.getElementById('admin-login-form');
        const errorMsg = document.getElementById('login-error');

        // Se já estiver logado, redireciona para admin
        if (sessionStorage.getItem('admin_token') && sessionStorage.getItem('user_data')) {
            try {
                const user = JSON.parse(sessionStorage.getItem('user_data'));
                if (user.tipo === 'admin') {
                    window.location.href = 'admin.html';
                }
            } catch (e) {}
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nusp = document.getElementById('admin-user').value;
            const senha = document.getElementById('admin-pass').value;

            try {
                const response = await auth.login(nusp, senha);
                const { usuario, token } = response;

                if (usuario.tipo !== 'admin') {
                    errorMsg.textContent = 'Usuário não possui permissão de administrador.';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Salvar token e dados
                sessionStorage.setItem('admin_token', token);
                sessionStorage.setItem('user_token', token);
                sessionStorage.setItem('user_data', JSON.stringify(usuario));
                window.location.href = 'admin.html';
            } catch (error) {
                errorMsg.textContent = error.message || 'Credenciais inválidas.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
